name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (strict)
        run: pnpm typecheck

      - name: i18n key parity (CA/ES/EN)
        run: pnpm lint:i18n

      - name: Verify PMIDs against PubMed (NCBI EUtils)
        run: pnpm verify:pmids

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Build (Next.js production)
        run: pnpm --filter @medcalc/web build
